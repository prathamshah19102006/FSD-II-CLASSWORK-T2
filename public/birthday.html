<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Baba</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Segoe UI', sans-serif;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: popIn 1.5s ease;
    }

    @keyframes popIn {
      0% {transform: scale(0.5); opacity: 0;}
      100% {transform: scale(1); opacity: 1;}
    }

    h1 {
      font-size: 64px;
      color: #e74c3c;
      margin-bottom: 20px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {transform: translateY(0);}
      50% {transform: translateY(-15px);}
    }

    p {
      font-size: 26px;
      color: #2c3e50;
      margin-top: 10px;
    }

    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti span {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #f39c12;
      animation: fall 5s linear infinite;
    }

    @keyframes fall {
      0% {transform: translateY(-100px) rotate(0deg);}
      100% {transform: translateY(100vh) rotate(360deg);}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Happy Birthday Baba 🎂</h1>
    <p>May your day be filled with love, laughter, and endless blessings!</p>
  </div>

  <div class="confetti">
    <!-- Generate multiple confetti pieces -->
    <span style="left:10%; background:#e74c3c;"></span>
    <span style="left:30%; background:#3498db;"></span>
    <span style="left:50%; background:#2ecc71;"></span>
    <span style="left:70%; background:#f1c40f;"></span>
    <span style="left:90%; background:#9b59b6;"></span>
  </div>
</body>
</html>
